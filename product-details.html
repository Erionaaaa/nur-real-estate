      // SLIDERi

      const mainImg = document.getElementById("mainImage");
      const thumbs = container.querySelectorAll(".property-thumb");
      const prevBtn = container.querySelector(".details-arrow.prev");
      const nextBtn = container.querySelector(".details-arrow.next");

      if (mainImg && thumbs.length > 0) {
        const imageSources = Array.from(thumbs).map(t => t.src);
        let currentIndex = 0;

        function showImage(index) {
          if (index < 0) index = imageSources.length - 1;
          if (index >= imageSources.length) index = 0;
          currentIndex = index;

          mainImg.src = imageSources[currentIndex];

          thumbs.forEach(t => t.classList.remove("active"));
          if (thumbs[currentIndex]) {
            thumbs[currentIndex].classList.add("active");
          }
        }

        thumbs.forEach((thumb, index) => {
          thumb.addEventListener("click", () => {
            showImage(index);
          });
        });

        if (prevBtn) {
          prevBtn.addEventListener("click", () => {
            showImage(currentIndex - 1);
          });
        }

        if (nextBtn) {
          nextBtn.addEventListener("click", () => {
            showImage(currentIndex + 1);
          });
        }

        // start
        showImage(0);
      }
